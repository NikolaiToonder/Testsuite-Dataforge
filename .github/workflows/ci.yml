name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Nightly tests at 02:00
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: '3.11'
  POSTGRES_VERSION: '15'
  APP_DIR: ./backend

jobs:
  # ============================================
  # JOB 1: Lint & Type Check
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-requests

      - name: Run Ruff (Linter)
        run: ruff check ${{ env.APP_DIR }}

      - name: Run MyPy (Type Checker)
        run: mypy ${{ env.APP_DIR }} --ignore-missing-imports

  # ============================================
  # JOB 2: Unit Tests (Ingen database)
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-json-report

      - name: Run Unit Tests
        run: |
          pytest ${{ env.APP_DIR }}/test_apis/UnitTesting \
               ${{ env.APP_DIR }}/test_libs/test_*.py \
               -v \
               --tb=short \
               --json-report \
               --json-report-file=test-results/unit-report.json \
               --cov=${{ env.APP_DIR }} \
               --cov-report=json \
               --cov-report=html

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            test-results/
            htmlcov/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.json
          fail_ci_if_error: false

  # ============================================
  # JOB 3: Integration Tests (Med Database)
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-json-report

      - name: Wait for PostgreSQL
        run: |
          pip install psycopg2-binary
          python -c "import socket; import time; socket.setdefaulttimeout(1); s = socket.socket(); done=False; t=0; print('Waiting for PostgreSQL...'); exec('try: s.connect((\"localhost\", 5432)); done=True; except: time.sleep(1); t+=1; print(f\"Attempt {t}...\"); exec(\"while not done and t < 30\")')"

      - name: Run Integration Tests
        run: |
          pytest ${{ env.APP_DIR }}/test_apis/Integration \
               ${{ env.APP_DIR }}/test_libs/Integration \
               -v \
               --tb=short \
               --json-report \
               --json-report-file=test-results/integration-report.json
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/

  # ============================================
  # JOB 4: Docker Build & Security Scan
  # ============================================
  docker-build:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # JOB 5: Deploy til Staging (Automatisk)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment: staging
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Legg til din deploy-logikk her:
          # - kubectl apply
          # - docker-compose up
          # - terraform apply
          # - etc.
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests against staging..."
          pytest tests/smoke/ -v

  # ============================================
  # JOB 6: Generate Test Report
  # ============================================
  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Generate HTML Report
        run: |
          pip install pytest-html
          # Kombiner rapporter hvis nødvendig
          echo "Test results ready for review"

      - name: Create PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Test Results\n\nAll tests completed. Check the artifacts for detailed reports.'
            })


